services:
  mariadb:
    image: mariadb:10.11
    container_name: tp_mariadb
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${GLPI_DB_NAME}
      MYSQL_USER: ${GLPI_DB_USER}
      MYSQL_PASSWORD: ${GLPI_DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p${MARIADB_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - glpi_network

  glpi:
    image: elestio/glpi:latest
    platform: linux/amd64
    container_name: tp_glpi
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      TZ: Africa/Ouagadougou
      GLPI_DB_HOST: ${GLPI_DB_HOST}
      GLPI_DB_NAME: ${GLPI_DB_NAME}
      GLPI_DB_USER: ${GLPI_DB_USER}
      GLPI_DB_PASSWORD: ${GLPI_DB_PASSWORD}
    volumes:
      - glpi_files:/var/www/html/files
    networks:
      - glpi_network

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: tp_cadvisor
    restart: unless-stopped
    ports:
      - "8081:8080"
    command:
      - --housekeeping_interval=15s
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk:/dev/disk:ro
    networks:
      - glpi_network

  prometheus:
    image: prom/prometheus:latest
    container_name: tp_prometheus
    restart: unless-stopped
    depends_on:
      - cadvisor
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION}
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - glpi_network

  grafana:
    image: grafana/grafana:latest
    container_name: tp_grafana
    restart: unless-stopped
    depends_on:
      - mariadb
      - prometheus
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - glpi_network

networks:
  glpi_network:
    driver: bridge

volumes:
  mariadb_data:
  glpi_files:
  prometheus_data:
  grafana_data:
